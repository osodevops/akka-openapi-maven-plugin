name: CI Build & Test

on:
  pull_request:
    branches: [ main, develop ]
  push:
    branches: [ main, develop ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        java-version: [ '17', '21' ]

    name: Build with Java ${{ matrix.java-version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK ${{ matrix.java-version }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java-version }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and test
        run: |
          mvn clean verify \
            --batch-mode \
            --no-transfer-progress

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-java-${{ matrix.java-version }}
          path: |
            **/target/surefire-reports/*.xml
            **/target/failsafe-reports/*.xml

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: '**/target/surefire-reports/TEST-*.xml'
          check_name: Test Results (JDK ${{ matrix.java-version }})

  code-quality:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build for analysis
        run: |
          mvn clean compile test-compile \
            --batch-mode \
            --no-transfer-progress

      - name: Run SpotBugs
        run: |
          mvn spotbugs:check \
            --batch-mode \
            --no-transfer-progress \
            -Dspotbugs.failOnError=false || true

      - name: Run Checkstyle
        run: |
          mvn checkstyle:check \
            --batch-mode \
            --no-transfer-progress \
            -Dcheckstyle.failOnViolation=false || true

      - name: Check dependencies for vulnerabilities
        run: |
          mvn org.owasp:dependency-check-maven:check \
            --batch-mode \
            --no-transfer-progress \
            -DfailBuildOnCVSS=11 || true

      - name: Check for uncommitted changes
        run: |
          if [[ -n $(git status --porcelain) ]]; then
            echo "There are uncommitted changes after the build"
            git status
            exit 1
          fi

  coverage:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with coverage
        run: |
          mvn clean verify \
            --batch-mode \
            --no-transfer-progress

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: |
            **/target/site/jacoco/jacoco.xml
          flags: unittests
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload coverage report artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            **/target/site/jacoco/

  example-project:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and generate OpenAPI
        run: |
          mvn -B clean install -DskipTests
          echo "=== Generated OpenAPI Specification ==="
          cat akka-openapi-example/target/openapi.yaml

      - name: Upload generated OpenAPI spec
        uses: actions/upload-artifact@v4
        with:
          name: openapi-spec
          path: akka-openapi-example/target/openapi.yaml
